name: Emulator Test

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  test-on-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build debug APK
        run: |
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          ./gradlew assembleDebug
          APK=$(find app/build/outputs/apk/debug -name "*arm64*" -o -name "*x86_64*" -o -name "*universal*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Built APK: $APK"
          ls -la app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run emulator test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -e

            echo "=== Device info ==="
            adb shell getprop ro.build.version.sdk
            adb shell getprop ro.build.version.release

            echo ""
            echo "=== Installing APK ==="
            # Use x86_64 APK for emulator
            APK=$(find app/build/outputs/apk/debug -name "*x86_64*" | head -1)
            if [ -z "$APK" ]; then
              APK=$(find app/build/outputs/apk/debug -name "*universal*" | head -1)
            fi
            echo "Installing: $APK"
            adb install -r "$APK"
            echo "Install: SUCCESS"

            echo ""
            echo "=== Launching Termux ==="
            adb shell am start -n com.termux/.app.TermuxActivity
            sleep 10

            echo ""
            echo "=== Checking if Termux is running ==="
            adb shell pidof com.termux || { echo "FAIL: Termux process not found"; exit 1; }
            echo "Termux PID: $(adb shell pidof com.termux)"

            echo ""
            echo "=== Checking logcat for crashes ==="
            adb logcat -d -s AndroidRuntime:E | tail -30
            CRASHES=$(adb logcat -d -s AndroidRuntime:E | grep -c "FATAL EXCEPTION" || true)
            if [ "$CRASHES" -gt 0 ]; then
              echo "FAIL: Found $CRASHES crash(es) in logcat"
              adb logcat -d | grep -A 20 "FATAL EXCEPTION" | head -60
              exit 1
            fi
            echo "No crashes detected"

            echo ""
            echo "=== Checking Termux bootstrap ==="
            sleep 15
            # Check if bootstrap was extracted (prefix dir exists)
            adb shell "run-as com.termux ls files/usr/bin/sh" 2>/dev/null && echo "Bootstrap: extracted OK" || echo "Bootstrap: still extracting or failed (may need more time)"

            echo ""
            echo "=== Checking linker-exec library ==="
            adb shell "run-as com.termux ls -la files/usr/lib/libtermux-linker-exec.so" 2>/dev/null || echo "(Library is in APK native lib dir, not prefix)"
            NATIVE_LIB_DIR=$(adb shell pm path com.termux | head -1 | sed 's/package://' | sed 's/base.apk/lib\/x86_64/')
            echo "Native lib dir: $NATIVE_LIB_DIR"
            adb shell "ls $NATIVE_LIB_DIR/" 2>/dev/null || echo "Checking alternative path..."
            adb shell "ls /data/app/*/com.termux*/lib/x86_64/" 2>/dev/null | head -10

            echo ""
            echo "=== Checking for ANR or process death ==="
            sleep 5
            adb shell pidof com.termux || { echo "FAIL: Termux died"; exit 1; }
            echo "Termux still running after 30s: PASS"

            echo ""
            echo "=== Termux logcat output ==="
            adb logcat -d | grep -i "termux\|TermuxInstaller\|TermuxService\|linker-exec\|LD_PRELOAD" | tail -40

            echo ""
            echo "=== TEST SUMMARY ==="
            echo "Install:  PASS"
            echo "Launch:   PASS"
            echo "No crash: PASS"
            echo "Running:  PASS"

name: Emulator Test

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  test-on-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build debug APK
        run: |
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          ./gradlew assembleDebug
          APK=$(find app/build/outputs/apk/debug -name "*arm64*" -o -name "*x86_64*" -o -name "*universal*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Built APK: $APK"
          ls -la app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run emulator test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Device info ==="
            adb shell getprop ro.build.version.sdk
            adb shell getprop ro.build.version.release
            echo ""
            echo "=== Installing APK ==="
            APK=$(ls app/build/outputs/apk/debug/*x86_64*.apk 2>/dev/null | head -1)
            test -z "$APK" && APK=$(ls app/build/outputs/apk/debug/*universal*.apk 2>/dev/null | head -1)
            echo "Installing: $APK"
            adb install -r "$APK" || exit 1
            echo "Install: SUCCESS"
            echo ""
            echo "=== Launching Termux ==="
            adb shell am start -n com.termux/.app.TermuxActivity
            sleep 10
            echo ""
            echo "=== Checking if Termux is running ==="
            adb shell pidof com.termux || exit 1
            echo "Termux process found: PASS"
            echo ""
            echo "=== Checking logcat for crashes ==="
            CRASHES=$(adb logcat -d -s AndroidRuntime:E | grep -c "FATAL EXCEPTION" || true)
            echo "Crash count: $CRASHES"
            test "$CRASHES" -gt 0 && adb logcat -d | grep -A 20 "FATAL EXCEPTION" | head -60 && exit 1
            echo "No crashes: PASS"
            echo ""
            echo "=== Waiting for bootstrap ==="
            sleep 20
            adb shell "run-as com.termux ls files/usr/bin/sh" && echo "Bootstrap: PASS" || echo "Bootstrap: still loading"
            echo ""
            echo "=== Native libs ==="
            adb shell "run-as com.termux ls lib/" || true
            echo ""
            echo "=== Checking process still alive ==="
            sleep 5
            adb shell pidof com.termux || exit 1
            echo "Still running after 35s: PASS"
            echo ""
            echo "=== Termux logs ==="
            adb logcat -d | grep -iE "termux|linker.exec|LD_PRELOAD" | tail -40
            echo ""
            echo "=== RESULT: ALL TESTS PASSED ==="

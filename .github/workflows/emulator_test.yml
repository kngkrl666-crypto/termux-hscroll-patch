name: Emulator Test

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  test-on-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build debug APK
        run: |
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          ./gradlew assembleDebug
          APK=$(find app/build/outputs/apk/debug -name "*arm64*" -o -name "*x86_64*" -o -name "*universal*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Built APK: $APK"
          ls -la app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run emulator test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/workflows/emulator_test.sh

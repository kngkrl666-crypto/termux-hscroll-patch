name: Emulator Test

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  test-on-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-sdk: 28
            label: "SDK28"
          - target-sdk: 34
            label: "SDK34"

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Override targetSdkVersion for SDK28 test
        if: matrix.target-sdk == 28
        run: sed -i 's/targetSdkVersion=34/targetSdkVersion=28/' gradle.properties

      - name: Build debug APK (${{ matrix.label }})
        run: |
          echo "targetSdkVersion=$(grep targetSdkVersion gradle.properties)"
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          ./gradlew assembleDebug
          ls -la app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run emulator test (${{ matrix.label }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/workflows/emulator_test.sh
